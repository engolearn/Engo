<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>المحادثات - EnGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100vh; background: #0a0a0a; position: relative; }
        /* إصلاح مشكلة تغطية الأزرار لمنطقة الكتابة */
.input-area {
    background: #1f1f1f;
    padding: 0.8rem;
    display: flex;
    gap: 0.8rem;
    align-items: center;
    border-top: 1px solid #2a2a2a;
    position: relative;
    z-index: 10;
}

/* التأكد من أن منطقة الكتابة في الأسفل */
.chat-area {
    display: flex;
    flex-direction: column;
    background: #0e0e0e;
    height: 100vh;
    position: relative;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    padding-bottom: 80px; /* إضافة مساحة للكتابة */
}

/* تثبيت منطقة الإدخال في الأسفل */
.input-area {
    position: sticky;
    bottom: 0;
    background: #1f1f1f;
    width: 100%;
}
        /* قائمة المحادثات */
        .conversations-list { width: 100%; max-width: 400px; background: #111111; display: flex; flex-direction: column; height: 100vh; transition: transform 0.3s ease; z-index: 20; }
        @media (max-width: 768px) { .conversations-list { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: translateX(0); z-index: 10; } .conversations-list.hide { transform: translateX(-100%); } .chat-area { width: 100%; position: absolute; left: 0; top: 0; height: 100%; z-index: 5; background: #0e0e0e; } .chat-area.show { z-index: 15; } }
        @media (min-width: 769px) { .conversations-list { display: flex; position: relative; } .chat-area { flex: 1; position: relative; } .back-to-list { display: none !important; } }
        
        .conversations-header { background: #1f1f1f; padding: 1rem; padding-top: calc(1rem + var(--safe-top)); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; }
        .conversations-header h2 { font-size: 1.3rem; font-weight: 600; color: #25D366; }
        .header-actions { display: flex; gap: 1rem; }
        .header-actions button, .header-actions a { background: none; border: none; color: #25D366; font-size: 1.2rem; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
        .header-actions button:active, .header-actions a:active { background: #2a2a2a; }
        
        .search-bar { background: #1f1f1f; padding: 0.8rem; }
        .search-bar input { width: 100%; padding: 0.8rem 1rem; background: #2a2a2a; border: none; border-radius: 25px; color: white; font-family: 'Cairo', sans-serif; font-size: 0.9rem; }
        .search-bar input::placeholder { color: #888; }
        
        .chat-tabs { display: flex; background: #1f1f1f; border-bottom: 1px solid #2a2a2a; }
        .chat-tab { flex: 1; padding: 0.8rem; text-align: center; cursor: pointer; color: #888; font-weight: 500; transition: all 0.2s; }
        .chat-tab.active { color: #25D366; border-bottom: 2px solid #25D366; }
        
        .conversations-scroll { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
        .conversation-item { display: flex; align-items: center; padding: 0.8rem 1rem; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid #1f1f1f; }
        .conversation-item:active { background: #1f1f1f; }
        .avatar { width: 50px; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white; margin-left: 1rem; flex-shrink: 0; }
        .avatar.group { background: #2a5f3a; }
        .conversation-info { flex: 1; min-width: 0; }
        .conversation-name { font-weight: 600; font-size: 1rem; color: white; margin-bottom: 0.2rem; display: flex; justify-content: space-between; align-items: center; }
        .conversation-preview { font-size: 0.8rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: #25D366; color: white; border-radius: 50%; min-width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; padding: 0 5px; }
        .online-status { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 6px; }
        .online-status.online { background: #25D366; box-shadow: 0 0 5px #25D366; }
        
        /* محادثة AI مميزة */
        #aiChatItem { background: linear-gradient(135deg, rgba(37, 211, 102, 0.15), rgba(7, 94, 84, 0.15)); border: 1px solid rgba(37, 211, 102, 0.3); margin-bottom: 1rem; border-radius: 12px; }
        #aiChatItem:hover { background: linear-gradient(135deg, rgba(37, 211, 102, 0.25), rgba(7, 94, 84, 0.25)); transform: translateX(-5px); }
        
        /* منطقة المحادثة */
        .chat-area { display: flex; flex-direction: column; background: #0e0e0e; height: 100vh; }
        .chat-header { background: #1f1f1f; padding: 0.8rem 1rem; padding-top: calc(0.8rem + var(--safe-top)); display: flex; align-items: center; gap: 0.8rem; border-bottom: 1px solid #2a2a2a; }
        .back-to-list { background: none; border: none; color: #25D366; font-size: 1.2rem; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .chat-header .avatar { width: 40px; height: 40px; margin-left: 0; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; color: white; font-size: 1rem; }
        .chat-header-status { font-size: 0.7rem; color: #888; }
        .chat-actions button { background: none; border: none; color: #888; font-size: 1.2rem; cursor: pointer; padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .message { display: flex; flex-direction: column; max-width: 80%; animation: fadeIn 0.2s ease; }
        .message.own { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 0.7rem 1rem; border-radius: 18px; word-wrap: break-word; }
        .message.own .message-bubble { background: #25D366; color: white; border-bottom-left-radius: 4px; }
        .message.other .message-bubble { background: #2a2a2a; color: #e5e5e5; border-bottom-right-radius: 4px; }
        .message-sender { font-size: 0.7rem; color: #888; margin-bottom: 0.2rem; margin-right: 0.5rem; }
        .message-time { font-size: 0.6rem; margin-top: 0.2rem; opacity: 0.6; display: flex; align-items: center; gap: 3px; justify-content: flex-end; }
        
        .input-area { background: #1f1f1f; padding: 0.8rem; display: flex; gap: 0.8rem; align-items: center; border-top: 1px solid #2a2a2a; padding-bottom: max(0.8rem, env(safe-area-inset-bottom)); }
        .input-area input { flex: 1; padding: 0.8rem 1rem; background: #2a2a2a; border: none; border-radius: 25px; color: white; font-family: 'Cairo', sans-serif; font-size: 0.9rem; }
        .input-area input:focus { outline: none; background: #333; }
        .send-btn { background: #25D366; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        .send-btn:active { transform: scale(0.95); }
        
        .connection-status { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.7rem; z-index: 100; pointer-events: none; }
        .connection-status.connected { background: #25D366; color: white; }
        .connection-status.disconnected { background: #e53e3e; color: white; }
        
        .empty-state { text-align: center; color: #888; padding: 2rem; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1f1f1f; width: 90%; max-width: 400px; padding: 1.5rem; border-radius: 20px; }
        .modal-content h3 { color: white; margin-bottom: 1rem; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 0.8rem; background: #2a2a2a; border: none; border-radius: 10px; color: white; margin: 0.5rem 0; }
        .modal-content button { width: 100%; padding: 0.8rem; margin-top: 0.5rem; border: none; border-radius: 25px; cursor: pointer; }
        .user-item { padding: 0.8rem; background: #2a2a2a; border-radius: 10px; margin-bottom: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 1rem; }
        
        .typing-indicator { display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: #2a2a2a; border-radius: 20px; width: fit-content; }
        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: typing 1.4s infinite; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1f1f1f; }
        ::-webkit-scrollbar-thumb { background: #25D366; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- قائمة المحادثات -->
        <div class="conversations-list" id="conversationsList">
            <div class="conversations-header">
                <h2><i class="fas fa-comment-dots"></i> EnGo</h2>
                <div class="header-actions">
                    <a href="/"><i class="fas fa-home"></i></a>
                    <button onclick="showCreateRoomModal()"><i class="fas fa-plus"></i></button>
                    <button onclick="showUsersList()"><i class="fas fa-user-plus"></i></button>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="بحث..." onkeyup="filterConversations()">
            </div>
            
            <div class="chat-tabs">
                <div class="chat-tab active" onclick="switchTab('rooms')">الغرف</div>
                <div class="chat-tab" onclick="switchTab('private')">الخاص</div>
            </div>
            
            <div class="conversations-scroll">
                <div id="roomsList">
                    <div class="empty-state"><i class="fas fa-comments"></i>جاري تحميل الغرف...</div>
                </div>
                <div id="privateList" style="display: none;">
                    <!-- 🤖 AI Assistant -->
                    <div class="conversation-item" id="aiChatItem" onclick="openAIChat()">
                        <div class="avatar" style="background: linear-gradient(135deg, #25D366, #075E54);">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="conversation-info">
                            <div class="conversation-name">
                                <span><span class="online-status online"></span> 🤖 EnGo AI Assistant</span>
                            </div>
                            <div class="conversation-preview">اسألني أي شيء عن اللغة الإنجليزية...</div>
                        </div>
                    </div>
                    <div id="privateChatsList"></div>
                </div>
            </div>
        </div>
        
        <!-- منطقة المحادثة -->
        <div class="chat-area" id="chatArea" style="display: none;">
            <div class="chat-header">
                <button class="back-to-list" onclick="showConversationsList()"><i class="fas fa-arrow-right"></i></button>
                <div class="avatar" id="chatAvatar"><i class="fas fa-user"></i></div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName"></div>
                    <div class="chat-header-status" id="chatStatus"></div>
                </div>
                <div class="chat-actions">
                    <button id="inviteBtn" onclick="inviteToRoom()" style="display: none;"><i class="fas fa-user-plus"></i></button>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state"><i class="fas fa-comments"></i><p>اختر محادثة للبدء</p></div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="اكتب رسالة..." onkeypress="handleKeyPress(event)" disabled>
                <button class="send-btn" onclick="sendMessage()" disabled><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <div id="connectionStatus" class="connection-status disconnected">⛔ جاري الاتصال...</div>
    
    <!-- Modals -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <h3>إنشاء غرفة جديدة</h3>
            <input type="text" id="roomName" placeholder="اسم الغرفة">
            <label style="color:white;"><input type="checkbox" id="isPrivate"> غرفة خاصة</label>
            <div id="inviteEmailsField" style="display: none;">
                <input type="text" id="inviteEmails" placeholder="البريد الإلكتروني (مفصول بفواصل)">
            </div>
            <button onclick="createRoom()" style="background: #25D366; color: white;">إنشاء</button>
            <button onclick="closeCreateRoomModal()" style="background: #2a2a2a; color: white;">إلغاء</button>
        </div>
    </div>
    
    <div id="inviteModal" class="modal">
        <div class="modal-content">
            <h3>دعوة إلى الغرفة</h3>
            <input type="email" id="inviteEmail" placeholder="البريد الإلكتروني">
            <textarea id="inviteMessage" rows="3" placeholder="رسالة"></textarea>
            <button onclick="sendInvite()" style="background: #25D366; color: white;">إرسال الدعوة</button>
            <button onclick="closeInviteModal()" style="background: #2a2a2a; color: white;">إلغاء</button>
        </div>
    </div>
    
    <div id="usersListModal" class="modal">
        <div class="modal-content">
            <h3>👥 المستخدمين</h3>
            <div id="usersForChat" style="max-height: 400px; overflow-y: auto;"></div>
            <button onclick="closeUsersListModal()" style="background: #2a2a2a; color: white;">إغلاق</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        const API_URL = window.location.origin;
        let socket = null;
        let currentChat = null;
        let currentChatType = null;
        let currentUser = null;
        let currentPrivateMessages = [];
        let currentPrivateUserId = null;
        let currentPrivateUserName = null;
        let currentPrivateConvId = null;
        let roomsList = [];
        let privateChats = [];
        
        // ==================== AI Variables ====================
        let currentAIConversationId = null;
        
        // ==================== UI Functions ====================
        function showConversationsList() {
            document.getElementById('conversationsList').classList.remove('hide');
            document.getElementById('chatArea').style.display = 'none';
            if (window.innerWidth <= 768) {
                document.getElementById('conversationsList').classList.remove('hide');
            }
        }
        
        function openChatArea() {
            document.getElementById('chatArea').style.display = 'flex';
            if (window.innerWidth <= 768) {
                document.getElementById('conversationsList').classList.add('hide');
            }
        }
        
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.textContent = message;
            alertDiv.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:25px;z-index:10000;background:${type==='success'?'#25D366':'#e53e3e'};color:white;font-family:Cairo;font-size:0.9rem`;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        
        function filterConversations() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const roomsContainer = document.getElementById('roomsList');
            const privateContainer = document.getElementById('privateList');
            
            if (roomsContainer) {
                const items = roomsContainer.querySelectorAll('.conversation-item');
                items.forEach(item => {
                    const name = item.querySelector('.conversation-name span:first-child')?.innerText?.toLowerCase() || '';
                    item.style.display = name.includes(search) ? 'flex' : 'none';
                });
            }
            if (privateContainer) {
                const items = privateContainer.querySelectorAll('.conversation-item');
                items.forEach(item => {
                    const name = item.querySelector('.conversation-name span:first-child')?.innerText?.toLowerCase() || '';
                    item.style.display = name.includes(search) ? 'flex' : 'none';
                });
            }
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
            if (tab === 'rooms') {
                document.querySelector('.chat-tab:first-child').classList.add('active');
                document.getElementById('roomsList').style.display = 'block';
                document.getElementById('privateList').style.display = 'none';
                loadRooms();
            } else {
                document.querySelector('.chat-tab:last-child').classList.add('active');
                document.getElementById('roomsList').style.display = 'none';
                document.getElementById('privateList').style.display = 'block';
                loadPrivateChats();
            }
        }
        
        // ==================== Auth ====================
        async function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || !user.id) {
                showAlert('❌ يرجى تسجيل الدخول', 'error');
                setTimeout(() => window.location.href='/',2000);
                return false;
            }
            currentUser = user;
            return true;
        }
        
        // ==================== Socket Connection ====================
        function connectSocket() {
            const token = localStorage.getItem('token');
            if (!token) return;
            
            socket = io(API_URL, { 
                auth: { token },
                transports: ['websocket', 'polling'],
                reconnection: true
            });
            
            socket.on('connect', () => {
                document.getElementById('connectionStatus').innerHTML = '✅ متصل';
                document.getElementById('connectionStatus').className = 'connection-status connected';
                loadRooms();
                loadPrivateChats();
            });
            
            socket.on('disconnect', () => {
                document.getElementById('connectionStatus').innerHTML = '⛔ غير متصل';
                document.getElementById('connectionStatus').className = 'connection-status disconnected';
            });
            
            socket.on('rooms_list', (rooms) => { roomsList = rooms; renderRoomsList(); });
            socket.on('private_conversations_list', (chats) => { privateChats = chats; renderPrivateList(); });
            
            socket.on('new_message', (msg) => {
                if (currentChatType === 'room' && currentChat === msg.roomId) {
                    appendMessage(msg);
                }
                loadRooms();
            });
            
            socket.on('private_message_received', (msg) => {
                if (currentChatType === 'private' && currentPrivateUserId === msg.from) {
                    currentPrivateMessages.push(msg);
                    renderPrivateMessages();
                    if (currentPrivateConvId) {
                        socket.emit('mark_messages_read', currentPrivateConvId);
                    }
                }
                loadPrivateChats();
                showAlert(`💬 رسالة من ${msg.fromName}`, 'success');
            });
            
            socket.on('room_invite', (data) => {
                if (confirm(`📨 ${data.invitedBy} دعاك للانضمام إلى "${data.roomName}"`)) {
                    joinRoom(data.roomId, data.roomName);
                }
            });
            
            socket.on('user_joined', (user) => { addSystemMessage(`${user.name} انضم`); loadRooms(); });
            socket.on('user_left', (user) => { addSystemMessage(`${user.name} غادر`); loadRooms(); });
        }
        
        // ==================== Rooms ====================
        function loadRooms() { if(socket?.connected) socket.emit('get_rooms'); }
        
        function renderRoomsList() {
            const container = document.getElementById('roomsList');
            if(!roomsList?.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-comments"></i>لا توجد غرف<br>أنشئ غرفة جديدة</div>';
                return;
            }
            container.innerHTML = roomsList.map(room => `
                <div class="conversation-item" onclick="joinRoom('${room.id}','${escapeHtml(room.name)}')">
                    <div class="avatar group"><i class="fas fa-users"></i></div>
                    <div class="conversation-info">
                        <div class="conversation-name"><span>${escapeHtml(room.name)}</span></div>
                        <div class="conversation-preview">${room.lastMessage?.text ? escapeHtml(room.lastMessage.text.substring(0,40)) : 'لا توجد رسائل'}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function joinRoom(roomId, roomName) {
            if(!socket?.connected) return showAlert('❌ غير متصل','error');
            socket.emit('join_room', roomId, (res) => {
                if(res?.success) {
                    currentChat = roomId;
                    currentChatType = 'room';
                    document.getElementById('chatName').innerText = roomName;
                    document.getElementById('chatStatus').innerText = `${res.room.members?.length||0} عضو`;
                    document.getElementById('chatAvatar').innerHTML = '<i class="fas fa-users"></i>';
                    document.getElementById('inviteBtn').style.display = 'block';
                    document.getElementById('messageInput').disabled = false;
                    document.querySelector('.send-btn').disabled = false;
                    document.getElementById('chatMessages').innerHTML = '';
                    res.messages?.forEach(m => appendMessage(m));
                    openChatArea();
                    loadRooms();
                } else showAlert('❌ لا يمكن الانضمام','error');
            });
        }
        
        function createRoom() {
            const name = document.getElementById('roomName').value.trim();
            if(!name) return showAlert('❌ أدخل اسم الغرفة','error');
            const isPrivate = document.getElementById('isPrivate').checked;
            const allowedUsers = isPrivate ? document.getElementById('inviteEmails').value.split(',').map(e=>e.trim()).filter(e=>e) : [];
            
            socket.emit('create_room', { name, private: isPrivate, allowedUsers }, (res) => {
                if(res?.success) {
                    closeCreateRoomModal();
                    showAlert(`✅ تم إنشاء "${name}"`,'success');
                    loadRooms();
                    setTimeout(() => joinRoom(res.room.id, res.room.name), 500);
                }
            });
        }
        
        // ==================== Private Chats ====================
        function loadPrivateChats() { 
            if(socket?.connected) {
                socket.emit('get_my_conversations', (response) => {
                    if(response?.success) {
                        privateChats = response.conversations;
                        renderPrivateList();
                    }
                });
            }
        }
        
        function renderPrivateList() {
    const container = document.getElementById('privateList');
    
    // تنظيف المحتوى مع الحفاظ على عنصر AI
    const aiElement = document.getElementById('aiChatItem');
    container.innerHTML = '';
    
    // إعادة إضافة عنصر AI
    if (aiElement) {
        container.appendChild(aiElement);

        function openPrivateChat(userId, userName, conversationId) {

            currentChatType = 'private';
            currentPrivateUserId = userId;
            currentPrivateUserName = userName;

            document.getElementById('chatMessages').innerHTML = '<div class="empty-state">جاري التحميل...</div>';
            
            socket.emit('start_private_chat', userId, (res) => {
                if(res?.success) {
                    currentPrivateMessages = res.conversation.messages || [];
                    currentPrivateConvId = res.conversation.id;
                    renderPrivateMessages();
                    socket.emit('mark_messages_read', res.conversation.id);
                    loadPrivateChats();
                    openChatArea();

                container.innerHTML = '<div class="empty-state">لا توجد رسائل بعد<br>أرسل أول رسالة!</div>';

// دوال مساعدة
function getWordMeaning(word) {
    const dictionary = {
        'beautiful': 'جميل/جميلة - يوصف به الشيء الجميل',
        'challenge': 'تحدي - أمر صعب يتطلب جهداً',
        'opportunity': 'فرصة - موقف مناسب لتحقيق شيء',
        'important': 'مهم - له قيمة كبيرة',
        'difficult': 'صعب - ليس سهلاً',
        'amazing': 'مذهل - يثير الدهشة والإعجاب',
        'excellent': 'ممتاز - عالي الجودة',
        'wonderful': 'رائع - جميل جداً',
        'hello': 'مرحباً - تحية للترحيب',
        'goodbye': 'وداعاً - تحية للمغادرة',
        'please': 'من فضلك - كلمة مهذبة للطلب',
        'sorry': 'آسف - اعتذار',
        'yes': 'نعم - للإيجاب',
        'no': 'لا - للنفي',
        'big': 'كبير - عكس صغير',
        'small': 'صغير - عكس كبير',
        'happy': 'سعيد - فرحان',
        'sad': 'حزين - غير سعيد'
    };
    return dictionary[word.toLowerCase()] || `${word} هي كلمة إنجليزية. هل تريد مني أن أشرحها بشكل أعمق مع أمثلة؟`;
}

function getExampleSentence(word) {
    const examples = {
        'beautiful': 'The sunset is beautiful (الغروب جميل)',
        'challenge': 'Learning English is a fun challenge (تعلم الإنجليزية تحدٍ ممتع)',
        'opportunity': 'This is a great opportunity to learn (هذه فرصة رائعة للتعلم)',
        'important': 'Education is very important (التعليم مهم جداً)',
        'difficult': 'Some words are difficult to pronounce (بعض الكلمات صعبة النطق)',
        'amazing': 'You are doing an amazing job! (أنت تقوم بعمل مذهل!)',
        'excellent': 'You got an excellent score! (حصلت على درجة ممتازة!)',
        'wonderful': "It's a wonderful day to learn English (إنه يوم رائع لتعلم الإنجليزية)",
        'hello': 'Hello! How are you? (مرحباً! كيف حالك؟)',
        'please': 'Please help me (من فضلك ساعدني)',
        'sorry': 'I am sorry for being late (أنا آسف للتأخير)',
        'happy': 'I am happy to learn English (أنا سعيد لتعلم الإنجليزية)'
    };
    return examples[word.toLowerCase()] || `This is an example sentence with the word "${word}"`;
}

function getCorrection(sentence) {
    // تصحيحات بسيطة
    if (sentence.toLowerCase().includes('i am go')) {
        return '❌ "I am go" → ✅ "I go" أو "I am going"';
    }
    if (sentence.toLowerCase().includes('she go')) {
        return '❌ "She go" → ✅ "She goes"';
    }
    if (sentence.toLowerCase().includes('he dont')) {
        return '❌ "He dont" → ✅ "He doesn\'t"';
    }
    if (sentence.toLowerCase().includes('yesterday')) {
        return '✅ الجملة تحتاج إلى استخدام الماضي البسيط. أرسل لي الجملة كاملة لتصحيحها.';
    }
    return '✅ جملتك تبدو جيدة! هل تريد تدقيقاً أكثر تفصيلاً؟';
}

function getExplanation(sentence) {
    if (sentence.toLowerCase().includes('go')) {
        return 'الفعل "go" في المضارع البسيط مع I/You/We/They يأتي بدون تغيير، ومع He/She/It يضاف له "es" ليصبح "goes"';
    }
    return 'سأقوم بتحليل جملتك وتقديم شرح مفصل للأخطاء إن وجدت.';
}

        // ==================== Send Messages ====================
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            if (currentChatType === 'ai') {
                sendAIMessage(text);
                input.value = '';
                return;
            }
            
            if(currentChatType === 'room') {
                const tempMessage = {
                    id: 'temp_' + Date.now(),
                    userId: currentUser.id,
                    userName: currentUser.name,
                    text: text,
                    timestamp: new Date(),
                    roomId: currentChat
                };
                appendMessage(tempMessage);
                input.value = '';
                
                socket.emit('send_message', { roomId: currentChat, text }, (res) => {
                    if(!res?.success) {
                        const tempMsg = document.querySelector(`[data-message-id="${tempMessage.id}"]`);
                        if(tempMsg) tempMsg.remove();
                        showAlert('❌ فشل إرسال الرسالة', 'error');
                    }
                });
            } else if (currentChatType === 'private') {
                const tempMessage = {
                    id: 'temp_' + Date.now(),
                    from: currentUser.id,
                    fromName: currentUser.name,
                    text: text,
                    timestamp: new Date(),
                    read: false
                };
                currentPrivateMessages.push(tempMessage);
                renderPrivateMessages();
                input.value = '';
                
                socket.emit('send_private_message', { 
                    targetUserId: currentPrivateUserId, 
                    message: text 
                }, (res) => {
                    if(res?.success && res.message) {
                        const index = currentPrivateMessages.findIndex(m => m.id === tempMessage.id);
                        if (index !== -1) {
                            currentPrivateMessages[index] = res.message;
                            renderPrivateMessages();
                        }
                    }
                });
            }
        }
        
        function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }

            div.setAttribute('data-message-id', msg.id || 'msg_' + Date.now());
            div.innerHTML = `
                ${!isOwn ? `<div class="message-sender">${escapeHtml(msg.userName)}</div>` : ''}
                <div class="message-bubble">
                    ${escapeHtml(msg.text)}
                    <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.style.cssText = 'text-align:center;color:#888;font-size:0.7rem;padding:0.5rem';
            div.innerHTML = `<i class="fas fa-info-circle"></i> ${escapeHtml(text)}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // ==================== Room Functions ====================
        function showCreateRoomModal() { document.getElementById('createRoomModal').style.display='flex'; }
        function closeCreateRoomModal() { document.getElementById('createRoomModal').style.display='none'; document.getElementById('roomName').value=''; document.getElementById('isPrivate').checked=false; document.getElementById('inviteEmailsField').style.display='none'; }
        document.getElementById('isPrivate').onchange=function(){ document.getElementById('inviteEmailsField').style.display=this.checked?'block':'none'; };
        
        let currentInviteRoomId=null;
        function inviteToRoom(){ if(!currentChat || currentChatType !== 'room') return showAlert('❌ اختر غرفة أولاً','error'); currentInviteRoomId=currentChat; document.getElementById('inviteModal').style.display='flex'; }
        function closeInviteModal(){ document.getElementById('inviteModal').style.display='none'; }
        function sendInvite(){
            const email=document.getElementById('inviteEmail').value.trim();
            if(!email) return showAlert('❌ أدخل البريد','error');
            socket.emit('invite_by_email',{email,roomId:currentInviteRoomId,roomName:document.getElementById('chatName').innerText,message:document.getElementById('inviteMessage').value},(res)=>{if(res?.success){showAlert(`✅ تم الإرسال إلى ${email}`,'success');closeInviteModal();}});
        }
        
        // ==================== Init ====================
        async function init() {
            if(await checkAuth()) {
                connectSocket();
                showConversationsList();
            }
        }
        init();
    </script>
</body>
</html>
