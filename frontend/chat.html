<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>المحادثات - EnGo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }
        
        /* ==================== App Container ==================== */
        .app {
            display: flex;
            height: 100vh;
            background: #0a0a0a;
            position: relative;
        }
        
        /* ==================== قائمة المحادثات ==================== */
        .conversations-list {
            width: 100%;
            max-width: 400px;
            background: #111111;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: transform 0.3s ease;
            z-index: 20;
        }
        
        @media (max-width: 768px) {
            .conversations-list {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                transform: translateX(0);
                z-index: 10;
            }
            .conversations-list.hide {
                transform: translateX(-100%);
            }
            .chat-area {
                width: 100%;
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                z-index: 5;
                background: #0e0e0e;
            }
            .chat-area.show {
                z-index: 15;
            }
        }
        
        @media (min-width: 769px) {
            .conversations-list {
                display: flex;
                position: relative;
            }
            .chat-area {
                flex: 1;
                position: relative;
            }
            .back-to-list {
                display: none !important;
            }
        }
        
        .safe-bottom {
            padding-bottom: max(0.8rem, env(safe-area-inset-bottom));
        }
        
        .input-area {
            background: #1f1f1f;
            padding: 0.8rem 0.8rem calc(0.8rem + env(safe-area-inset-bottom, 20px));
            display: flex;
            gap: 0.8rem;
            align-items: center;
            border-top: 1px solid #2a2a2a;
            position: relative;
            z-index: 20;
        }
        
        .conversations-list {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .conversations-header {
            background: #1f1f1f;
            padding: 1rem;
            padding-top: calc(1rem + var(--safe-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .conversations-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #25D366;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
        }
        
        .header-actions button,
        .header-actions a {
            background: none;
            border: none;
            color: #25D366;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        
        .header-actions button:active,
        .header-actions a:active {
            background: #2a2a2a;
        }
        
        .search-bar {
            background: #1f1f1f;
            padding: 0.8rem;
        }
        
        .search-bar input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #2a2a2a;
            border: none;
            border-radius: 25px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
        }
        
        .search-bar input::placeholder {
            color: #888;
        }
        
        .chat-tabs {
            display: flex;
            background: #1f1f1f;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .chat-tab {
            flex: 1;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            color: #888;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .chat-tab.active {
            color: #25D366;
            border-bottom: 2px solid #25D366;
        }
        
        .conversations-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }
        
        .conversation-item {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #1f1f1f;
        }
        
        .conversation-item:active {
            background: #1f1f1f;
        }
        
        .avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            margin-left: 1rem;
            flex-shrink: 0;
        }
        
        .avatar.group {
            background: #2a5f3a;
        }
        
        .conversation-info {
            flex: 1;
            min-width: 0;
        }
        
        .conversation-name {
            font-weight: 600;
            font-size: 1rem;
            color: white;
            margin-bottom: 0.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .conversation-preview {
            font-size: 0.8rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .unread-badge {
            background: #25D366;
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            padding: 0 5px;
        }
        
        .online-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }
        
        .online-status.online {
            background: #25D366;
            box-shadow: 0 0 5px #25D366;
        }
        
        .chat-area {
            display: flex;
            flex-direction: column;
            background: #0e0e0e;
            height: 100vh;
        }
        
        .chat-header {
            background: #1f1f1f;
            padding: 0.8rem 1rem;
            padding-top: calc(0.8rem + var(--safe-top));
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .back-to-list {
            background: none;
            border: none;
            color: #25D366;
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-header .avatar {
            width: 40px;
            height: 40px;
            margin-left: 0;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-name {
            font-weight: 600;
            color: white;
            font-size: 1rem;
        }
        
        .chat-header-status {
            font-size: 0.7rem;
            color: #888;
        }
        
        .chat-actions button {
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            width: 40px;
            height: 40px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }
        
        .message.own {
            align-self: flex-end;
        }
        
        .message.other {
            align-self: flex-start;
        }
        
        .message-bubble {
            padding: 0.7rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.own .message-bubble {
            background: #25D366;
            color: white;
            border-bottom-left-radius: 4px;
        }
        
        .message.other .message-bubble {
            background: #2a2a2a;
            color: #e5e5e5;
            border-bottom-right-radius: 4px;
        }
        
        .message-sender {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 0.2rem;
            margin-right: 0.5rem;
        }
        
        .message-time {
            font-size: 0.6rem;
            margin-top: 0.2rem;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 3px;
            justify-content: flex-end;
        }
        
        .empty-state {
            text-align: center;
            color: #888;
            padding: 2rem;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #1f1f1f;
            width: 90%;
            max-width: 400px;
            padding: 1.5rem;
            border-radius: 20px;
        }
        
        .modal-content h3 {
            color: white;
            margin-bottom: 1rem;
        }
        
        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 0.8rem;
            background: #2a2a2a;
            border: none;
            border-radius: 10px;
            color: white;
            margin: 0.5rem 0;
        }
        
        .modal-content button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.5rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .user-item {
            padding: 0.8rem;
            background: #2a2a2a;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .search-user-item {
            padding: 0.8rem;
            background: #2a2a2a;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .search-user-item button {
            background: #25D366;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1f1f1f;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #25D366;
            border-radius: 4px;
        }
        
        .connection-status {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 100;
            pointer-events: none;
        }
        
        .connection-status.connected {
            background: #25D366;
            color: white;
        }
        
        .connection-status.disconnected {
            background: #e53e3e;
            color: white;
        }
        /* أنماط البحث عن المستخدمين للدعوة */
.search-user-invite {
    padding: 0.8rem;

}

.search-user-invite button {

.search-user-invite button:active {

}

.invite-search-results {

}

.invite-selected-users {

}

.invite-user-tag {

.invite-user-tag button {

        /* تحسين منطقة الكتابة */
.input-area {

.input-area input {

.input-area input:focus {

}

.input-area input::placeholder {
    color: #888;

}

.send-btn {
    width: 50px;
    height: 50px;
    background: #25D366;
    border: none;

    cursor: pointer;
    transition: all 0.3s;
    display: flex;

}

.send-btn:hover {

.send-btn:active {

/* تحسين حالة الاتصال */

    position: fixed;

    border-radius: 30px;

    </style>
</head>
<body>
    <div class="app">
        <!-- قائمة المحادثات -->
        <div class="conversations-list" id="conversationsList">
            <div class="conversations-header">
                <h2><i class="fas fa-comment-dots"></i> EnGo</h2>
                <div class="header-actions">
                    <a href="/"><i class="fas fa-home"></i></a>
                    <button onclick="showCreateRoomModal()"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="بحث..." onkeyup="filterConversations()">
            </div>
            
            <div class="chat-tabs">
                <div class="chat-tab active" onclick="switchTab('rooms')">👥 المجموعات</div>
                <div class="chat-tab" onclick="switchTab('private')">💬 الخاص</div>
                <div class="chat-tab" onclick="switchTab('search')">🔍 البحث</div>
            </div>
            
            <div class="conversations-scroll">
                <div id="roomsList">
                    <div class="empty-state"><i class="fas fa-comments"></i>جاري تحميل المجموعات...</div>
                </div>
                <div id="privateList" style="display: none;">
                    <div class="empty-state"><i class="fas fa-user-friends"></i>جاري تحميل المحادثات...</div>
                </div>
                <div id="searchList" style="display: none;">
                    <div class="search-bar" style="padding: 0 0 1rem 0;">
                        <input type="text" id="searchUsername" placeholder="🔍 ابحث باسم المستخدم..." onkeyup="searchUsers()">
                    </div>
                    <div id="searchResults">
                        <div class="empty-state"><i class="fas fa-search"></i>ابحث عن مستخدم لبدء محادثة</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- منطقة المحادثة -->
        <div class="chat-area" id="chatArea" style="display: none;">

                <button class="back-to-list" onclick="showConversationsList()"><i class="fas fa-arrow-right"></i></button>
                <div class="avatar" id="chatAvatar"><i class="fas fa-user"></i></div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName"></div>

                </div>
                <div class="chat-actions">
                    <button id="inviteBtn" onclick="inviteToRoom()" style="display: none;"><i class="fas fa-user-plus"></i></button>

            <div class="input-area">
    <input type="text" id="messageInput" placeholder="اكتب رسالة..." onkeypress="handleKeyPress(event)" disabled>
    <button class="send-btn" onclick="sendMessage()" disabled>
        <i class="fas fa-paper-plane"></i>
    </button>

        </div>
    </div>
    
    <div id="connectionStatus" class="connection-status disconnected">
    <i class="fas fa-plug"></i> جاري الاتصال...
    </div>
    <!-- Modals -->

    <div class="modal-content">
        <h3>إنشاء مجموعة جديدة</h3>

    </div>
    </div>

        <h3>📨 دعوة إلى المجموعة</h3>
        <p id="inviteRoomName" style="color: #25D366; margin-bottom: 0.5rem;"></p>
        
        <input type="text" id="inviteUsernameSearchModal" placeholder="🔍 ابحث باسم المستخدم..." onkeyup="searchUsersToInviteModal()">

        <div id="selectedInviteUsersModal" class="invite-selected-users" style="margin-top: 0.5rem;">
            <span style="color: #888; font-size: 0.7rem;">المستخدمين المختارين:</span>
            <div id="selectedUsersListModal"></div>
        </div>
        
        <textarea id="inviteMessage" rows="2" placeholder="رسالة الدعوة (اختياري)"></textarea>
        
        <button onclick="sendInviteByUsername()" style="background: #25D366; color: white;">📤 إرسال الدعوة</button>
        <button onclick="closeInviteModal()" style="background: #2a2a2a; color: white;">إلغاء</button>
    </div>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        const API_URL = window.location.origin;
        let socket = null;
        let currentChat = null;
        let currentChatType = null;
        let currentUser = null;
        let currentPrivateMessages = [];
        let currentPrivateUserId = null;
        let currentPrivateUserName = null;
        let currentPrivateConvId = null;
        let roomsList = [];
        let privateChats = [];
        let allUsers = [];

        // ==================== دعوة المستخدمين عبر اسم المستخدم ====================
let allUsersList = [];
let selectedInviteUsers = [];
let selectedInviteUsersModal = [];

// تحميل قائمة المستخدمين
async function loadAllUsersList() {
    try {
        const token = localStorage.getItem('token');
        const res = await fetch(API_URL + '/api/users/chat-list', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
            allUsersList = await res.json();
        }
    } catch (error) {
        console.error('Error loading users:', error);
    }
}

// البحث عن مستخدمين للدعوة (في نافذة إنشاء الغرفة)
function searchUsersToInvite() {
    const searchTerm = document.getElementById('inviteUsernameSearch').value.toLowerCase().trim();
    const resultsContainer = document.getElementById('inviteSearchResults');
    
    if (!searchTerm) {
        resultsContainer.innerHTML = '';
        return;
    }
    
    // استبعاد المستخدم الحالي والمستخدمين المختارين بالفعل
    const filteredUsers = allUsersList.filter(user => 
        (user.username?.toLowerCase().includes(searchTerm) || 
         user.name?.toLowerCase().includes(searchTerm)) &&
        user.id !== currentUser?.id &&
        !selectedInviteUsers.some(u => u.id === user.id)
    );
    
    if (filteredUsers.length === 0) {

// إرسال الدعوة عبر اسم المستخدم
async function sendInviteByUsername() {
    if (!currentInviteRoomId || selectedInviteUsersModal.length === 0) {
        showAlert('❌ اختر مستخدمين للدعوة أولاً', 'error');
        return;
    }
    
    const message = document.getElementById('inviteMessage').value || 'انضم إلي في هذه المجموعة!';
    const token = localStorage.getItem('token');
    
    try {
        const res = await fetch(API_URL + '/api/chat/invite-by-username', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
                roomId: currentInviteRoomId,
                roomName: currentInviteRoomName,
                usernames: selectedInviteUsersModal.map(u => u.username),
                message: message
            })
        });
        
        const data = await res.json();
        
        if (res.ok) {
            showAlert(`✅ تم إرسال الدعوة إلى ${selectedInviteUsersModal.length} مستخدم`, 'success');
            closeInviteModal();
        } else {
            showAlert('❌ ' + (data.message || 'حدث خطأ'), 'error');
        }
    } catch (error) {
        console.error('Error sending invite:', error);
        showAlert('❌ خطأ في الاتصال', 'error');
    }
}

// تحديث دالة إنشاء الغرفة لإرسال الدعوات عبر username
function createRoom() {
    const name = document.getElementById('roomName').value.trim();
    if (!name) {
        showAlert('❌ أدخل اسم المجموعة', 'error');
        return;
    }
    
    const isPrivate = document.getElementById('isPrivate').checked;
    const invitedUsers = selectedInviteUsers.map(u => u.username);
    
    socket.emit('create_room', { 
        name, 
        private: isPrivate, 
        invitedUsernames: invitedUsers 
    }, (res) => {
        if (res?.success) {
            closeCreateRoomModal();
            showAlert(`✅ تم إنشاء "${name}"`, 'success');
            selectedInviteUsers = [];
            renderSelectedUsersList();
            loadRooms();
            setTimeout(() => joinRoom(res.room.id, res.room.name), 500);
        } else {
            showAlert('❌ ' + (res?.error || 'حدث خطأ'), 'error');
        }
    });
}

        // ==================== Socket Connection ====================
        function connectSocket() {
    const token = localStorage.getItem('token');
    if (!token) {
        console.error('❌ No token found');
        showAlert('❌ يرجى تسجيل الدخول', 'error');
        return;
    }
    
    console.log('🟡 Connecting to socket with token:', token.substring(0, 30) + '...');
    
    socket = io(API_URL, { 
        auth: { token },
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionAttempts: 5,
        timeout: 10000
    });
    
    socket.on('connect', () => {
        console.log('✅ Socket connected successfully!');
        document.getElementById('connectionStatus').innerHTML = '✅ متصل';
        document.getElementById('connectionStatus').className = 'connection-status connected';
        
        // تحميل البيانات بعد الاتصال مباشرة
        setTimeout(() => {
            console.log('🔄 Loading rooms and chats...');
            loadRooms();
            loadPrivateChats();
            loadAllUsers();
            loadAllUsersList();
        }, 500);
    });
    
    socket.on('connect_error', (error) => {
        console.error('❌ Socket connection error:', error);
        document.getElementById('connectionStatus').innerHTML = '⚠️ خطأ في الاتصال';
        document.getElementById('connectionStatus').className = 'connection-status disconnected';
        showAlert('⚠️ مشكلة في الاتصال بالخادم', 'error');
    });
    
    socket.on('disconnect', (reason) => {
        console.log('🔴 Socket disconnected:', reason);
        document.getElementById('connectionStatus').innerHTML = '⛔ غير متصل';
        document.getElementById('connectionStatus').className = 'connection-status disconnected';
    });
    
    // استقبال قائمة الغرف
    socket.on('rooms_list', (rooms) => { 
        console.log('📋 Received rooms_list:', rooms);
        roomsList = rooms; 
        renderRoomsList(); 
    });
    
    // استقبال المحادثات الخاصة
    socket.on('private_conversations_list', (chats) => { 
        console.log('💬 Received private_conversations_list:', chats);
        privateChats = chats; 
        renderPrivateList(); 
    });
    
    socket.on('new_message', (msg) => {
        console.log('📨 New message:', msg);
        if (currentChatType === 'room' && currentChat === msg.roomId) {
            appendMessage(msg);
        }
        loadRooms();
    });
    
    socket.on('private_message_received', (msg) => {
        console.log('💌 Private message:', msg);
        if (currentChatType === 'private' && currentPrivateUserId === msg.from) {
            currentPrivateMessages.push(msg);
            renderPrivateMessages();
            if (currentPrivateConvId) {
                socket.emit('mark_messages_read', currentPrivateConvId);
            }
        }
        loadPrivateChats();
        showAlert(`💬 رسالة من ${msg.fromName}`, 'success');
    });
    
    socket.on('room_invite', (data) => {
        console.log('📢 Room invite:', data);
        if (confirm(`📨 ${data.invitedBy} دعاك للانضمام إلى "${data.roomName}"`)) {
            joinRoom(data.roomId, data.roomName);
        }
    });
    
    socket.on('user_joined', (user) => { 
        console.log('👤 User joined:', user);
        addSystemMessage(`${user.name} انضم`); 
        loadRooms(); 
    });
    
    socket.on('user_left', (user) => { 
        console.log('👋 User left:', user);
        addSystemMessage(`${user.name} غادر`); 
        loadRooms(); 
    });
        }
        
        // ==================== Rooms ====================
        function loadRooms() { 
    if(socket?.connected) {
        socket.emit('get_rooms', (rooms) => {
            if(rooms) {
                roomsList = rooms;
                renderRoomsList();
            }
        });
    }
        }

        // ==================== Send Messages ====================
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text || !currentChat || !socket?.connected) return;
            
            if(currentChatType === 'room') {
                const tempMessage = {
                    id: 'temp_' + Date.now(),
                    userId: currentUser.id,
                    userName: currentUser.username || currentUser.name,
                    text: text,
                    timestamp: new Date(),
                    roomId: currentChat
                };
                appendMessage(tempMessage);
                input.value = '';
                
                socket.emit('send_message', { roomId: currentChat, text }, (res) => {
                    if(!res?.success) {
                        const tempMsg = document.querySelector(`[data-message-id="${tempMessage.id}"]`);
                        if(tempMsg) tempMsg.remove();
                        showAlert('❌ فشل إرسال الرسالة', 'error');
                    }
                });
            } else {
                const tempMessage = {
                    id: 'temp_' + Date.now(),
                    from: currentUser.id,
                    fromName: currentUser.username || currentUser.name,
                    text: text,
                    timestamp: new Date(),
                    read: false
                };
                currentPrivateMessages.push(tempMessage);
                renderPrivateMessages();
                input.value = '';
                
                socket.emit('send_private_message', { 
                    targetUserId: currentPrivateUserId, 
                    message: text 
                }, (res) => {
                    if(res?.success && res.message) {
                        const index = currentPrivateMessages.findIndex(m => m.id === tempMessage.id);
                        if (index !== -1) {
                            currentPrivateMessages[index] = res.message;
                            renderPrivateMessages();
                        }
                    }
                });
            }
        }
        
        function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }
        
        function appendMessage(msg) {
            const isOwn = msg.userId === currentUser?.id;
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            div.setAttribute('data-message-id', msg.id || 'msg_' + Date.now());
            div.innerHTML = `
                ${!isOwn ? `<div class="message-sender">${escapeHtml(msg.userName)}</div>` : ''}
                <div class="message-bubble">
                    ${escapeHtml(msg.text)}
                    <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.style.cssText = 'text-align:center;color:#888;font-size:0.7rem;padding:0.5rem';
            div.innerHTML = `<i class="fas fa-info-circle"></i> ${escapeHtml(text)}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        // ==================== Room Functions ====================
        function showCreateRoomModal() { document.getElementById('createRoomModal').style.display='flex'; }
        function closeCreateRoomModal() { 
    document.getElementById('createRoomModal').style.display='none'; 
    document.getElementById('roomName').value = ''; 
    document.getElementById('isPrivate').checked = false;
    document.getElementById('inviteUsersSection').style.display = 'none';
    selectedInviteUsers = [];
    renderSelectedUsersList();
        }
        
        
        // ==================== Init ====================
        async function init() {
            if(await checkAuth()) {
                connectSocket();
                showConversationsList();
            }
        }
        init();
    </script>
</body>
</html>
