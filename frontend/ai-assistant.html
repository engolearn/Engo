<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - EnGo AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .logo {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo i {
            font-size: 1.5rem;
        }
        
        .badge {
            background: #25D366;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        
        /* منطقة المحادثة */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f7fafc;
        }
        
        .message {
            display: flex;
            margin-bottom: 1rem;
            animation: fadeIn 0.3s ease;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.ai {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 18px;
        }
        
        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-bubble {
            background: white;
            color: #2d3748;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .message-time {
            font-size: 0.65rem;
            margin-top: 0.25rem;
            opacity: 0.7;
        }
        
        /* مؤشر الكتابة */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.8rem 1rem;
            background: white;
            border-radius: 20px;
            width: fit-content;
        }
        
        .typing-dots {
            display: flex;
            gap: 3px;
        }
        
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        
        /* منطقة الإدخال */
        .input-area {
            background: white;
            padding: 1rem;
            display: flex;
            gap: 0.8rem;
            border-top: 1px solid #e2e8f0;
        }
        
        .input-area input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            font-family: 'Cairo', sans-serif;
        }
        
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            width: 45px;
            height: 45px;
            background: #667eea;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        
        /* اقتراحات */
        .suggestions {
            background: white;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            border-top: 1px solid #e2e8f0;
        }
        
        .suggestion-chip {
            background: #f7fafc;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .suggestion-chip:hover {
            background: #667eea;
            color: white;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* زر مسح المحادثة */
        .clear-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='/'">
                <i class="fas fa-arrow-right"></i>
            </button>
            <div class="logo">
                <i class="fas fa-robot"></i>
                <span>EnGo AI Assistant</span>
                <span class="badge">ذكي</span>
            </div>
            <button class="clear-btn" onclick="clearChat()">
                <i class="fas fa-trash"></i> مسح
            </button>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message ai">
                <div class="message-bubble">
                    👋 مرحباً! أنا EnGo AI، مساعدك الذكي لتعلم اللغة الإنجليزية.<br>
                    كيف يمكنني مساعدتك اليوم؟
                    <div class="message-time">الآن</div>
                </div>
            </div>
        </div>
        
        <div class="suggestions" id="suggestions">
            <div class="suggestion-chip" onclick="askQuestion('شرح قاعدة present simple')">📖 شرح قاعدة</div>
            <div class="suggestion-chip" onclick="askQuestion('كيف أحسن نطقي؟')">🗣️ تحسين النطق</div>
            <div class="suggestion-chip" onclick="askQuestion('معنى كلمة beautiful')">📚 معنى كلمة</div>
            <div class="suggestion-chip" onclick="askQuestion('نصائح لتعلم الإنجليزية')">💡 نصائح</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب سؤالك هنا..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';
        let conversationId = null;
        
        // التحقق من تسجيل الدخول
        async function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token || !user.id) {
                alert('❌ يرجى تسجيل الدخول أولاً');
                window.location.href = '/';
                return false;
            }
            return true;
        }
        
        // بدء محادثة جديدة
        async function startNewConversation() {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch(API_URL + '/ai/chat/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                const data = await res.json();
                
                if (data.success) {
                    conversationId = data.conversationId;
                    console.log('Conversation started:', conversationId);
                } else {
                    // استخدام الوضع المحلي إذا فشل الخادم
                    useLocalMode();
                }
            } catch (error) {
                console.error('Error starting conversation:', error);
                useLocalMode();
            }
        }
        
        // الوضع المحلي (بدون خادم)
        let localMode = false;
        
        function useLocalMode() {
            localMode = true;
            console.log('Using local mode');
            const area = document.getElementById('chatArea');
            const welcomeMsg = document.createElement('div');
            welcomeMsg.className = 'message ai';
            welcomeMsg.innerHTML = `
                <div class="message-bubble">
                    ⚠️ جاري العمل في وضع عدم الاتصال. الردود ستكون مبرمجة مسبقاً.
                    <div class="message-time">الآن</div>
                </div>
            `;
            area.appendChild(welcomeMsg);
        }
        
        // إرسال رسالة
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            // عرض رسالة المستخدم
            appendMessage(message, 'user');
            input.value = '';
            
            // إظهار مؤشر الكتابة
            showTypingIndicator();
            
            if (!localMode && conversationId) {
                try {
                    const token = localStorage.getItem('token');
                    const res = await fetch(API_URL + '/ai/chat/' + conversationId + '/message', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ message })
                    });
                    
                    const data = await res.json();
                    hideTypingIndicator();
                    
                    if (data.success) {
                        appendMessage(data.message, 'ai');
                    } else {
                        appendMessage(getLocalResponse(message), 'ai');
                    }
                } catch (error) {
                    hideTypingIndicator();
                    appendMessage(getLocalResponse(message), 'ai');
                }
            } else {
                // رد محلي
                setTimeout(() => {
                    hideTypingIndicator();
                    appendMessage(getLocalResponse(message), 'ai');
                }, 500);
            }
        }
        
        // ردود مبرمجة محلية
        function getLocalResponse(message) {
            const msg = message.toLowerCase();
            
            if (msg.includes('مرحب') || msg.includes('السلام')) {
                return '👋 وعليكم السلام! كيف يمكنني مساعدتك في تعلم الإنجليزية؟ 📚';
            }
            if (msg.includes('كيف') && msg.includes('تعلم')) {
                return '📚 **نصائح لتعلم الإنجليزية:**\n\n1️⃣ استمع يومياً للبودكاست\n2️⃣ اقرأ قصصاً قصيرة\n3️⃣ تحدث بدون خوف من الأخطاء\n4️⃣ اكتب جمل يومياً\n\nهل تريد مساعدة في أي نقطة؟';
            }
            if (msg.includes('قاعدة') || msg.includes('grammar')) {
                if (msg.includes('present')) {
                    return '📖 **Present Simple:**\nنستخدمه للحقائق والعادات.\nمثال: I play football every Friday.\nالتكوين: He/She/It + s/es';
                }
                return '📖 أخبرني أي قاعدة تريد شرحها (مثل: Present Simple، Past Simple، Future)';
            }
            if (msg.includes('معنى') || msg.includes('meaning')) {
                let word = message.replace('معنى', '').replace('ما معنى', '').trim();
                if (word) {
                    return `📖 معنى "${word}":\nهذه كلمة إنجليزية. هل تريد مني أن أشرحها بالتفصيل مع أمثلة؟`;
                }
                return '📖 أرسل لي الكلمة التي تريد معرفة معناها';
            }
            if (msg.includes('نطق') || msg.includes('pronunciation')) {
                return '🗣️ **نصائح للنطق:**\n1️⃣ استمع للمتحدثين الأصليين\n2️⃣ كرر الكلمات بصوت عالٍ\n3️⃣ سجل صوتك وقارن\n4️⃣ ركز على الأصوات الصعبة (th, r)';
            }
            if (msg.includes('شكر')) {
                return '🎉 العفو! أنا سعيد بمساعدتك. هل هناك شيء آخر؟';
            }
            if (msg.includes('اختبار') || msg.includes('exam')) {
                return '📝 للاستعداد للاختبارات:\n1️⃣ راجع الدروس\n2️⃣ حل الواجبات\n3️⃣ ركز على النقاط الصعبة\n4️⃣ خذ قسطاً كافياً من الراحة';
            }
            
            return '📚 سؤال ممتاز! يمكنني مساعدتك في:\n• شرح القواعد\n• تصحيح الجمل\n• شرح الكلمات\n• نصائح للتعلم\n\nما الذي تود أن تتعلمه اليوم؟';
        }
        
        function appendMessage(text, sender) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `
                <div class="message-bubble">
                    ${text.replace(/\n/g, '<br>')}
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }
        
        function showTypingIndicator() {
            const area = document.getElementById('chatArea');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span>EnGo AI يكتب</span>
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            area.appendChild(typingDiv);
            area.scrollTop = area.scrollHeight;
        }
        
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function askQuestion(question) {
            document.getElementById('messageInput').value = question;
            sendMessage();
        }
        
        function clearChat() {
            const area = document.getElementById('chatArea');
            area.innerHTML = `
                <div class="message ai">
                    <div class="message-bubble">
                        🧹 تم مسح المحادثة. كيف يمكنني مساعدتك؟
                        <div class="message-time">الآن</div>
                    </div>
                </div>
            `;
            startNewConversation();
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // تهيئة الصفحة
        async function init() {
            if (await checkAuth()) {
                await startNewConversation();
            }
        }
        
        init();
    </script>
</body>
</html>
