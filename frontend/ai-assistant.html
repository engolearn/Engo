<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnGo AI - المعلم الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .header {
            background: linear-gradient(105deg, #4f46e5, #7c3aed);
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .header h2 { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f1f5f9;
        }
        .message { margin-bottom: 1rem; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.ai { justify-content: flex-start; }
        .bubble {
            max-width: 75%;
            padding: 0.7rem 1rem;
            border-radius: 18px;
            line-height: 1.4;
        }
        .user .bubble { background: #4f46e5; color: white; }
        .ai .bubble { background: white; color: #1e293b; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        .input-area input {
            flex: 1;
            padding: 0.7rem;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            font-family: 'Cairo', sans-serif;
        }
        .input-area button {
            background: #4f46e5;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
        }
        .typing { display: flex; gap: 4px; padding: 0.5rem; }
        .typing span { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%,60%,100% { opacity: 0.4; } 30% { opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2><i class="fas fa-robot"></i> EnGo AI | المعلم الذكي</h2>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message ai">
            <div class="bubble">👋 مرحباً! أنا EnGo AI، اسألني أي شيء عن اللغة الإنجليزية 📚</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="اكتب سؤالك هنا..." onkeypress="handleKey(event)">
        <button onclick="send()">📤</button>
    </div>
</div>

<script>
    // ضع مفتاح API هنا - تأكد أنه صحيح
    const API_KEY = "AIzaSyCJ2SkGDSjKO9Y8UWN1k6W1CcKc2mqGwRA";
    
    let chatHistory = [];
    
    async function send() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (!message) return;
        
        addMessage(message, 'user');
        input.value = '';
        
        showTyping();
        
        try {
            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${API_KEY}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `أنت مساعد متخصص في اللغة الإنجليزية فقط، اسمك EnGo AI. أجب بالعربية مع أمثلة إنجليزية. السؤال: ${message}` }]
                        }]
                    })
                }
            );
            
            const data = await response.json();
            hideTyping();
            
            const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "عذراً، لم أستطع الرد حالياً.";
            addMessage(reply, 'ai');
            
        } catch (error) {
            hideTyping();
            addMessage("⚠️ خطأ في الاتصال. تأكد من صحة المفتاح والإنترنت.", 'ai');
        }
    }
    
    function addMessage(text, sender) {
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }
    
    function showTyping() {
        const area = document.getElementById('chatArea');
        const typingDiv = document.createElement('div');
        typingDiv.id = 'typing';
        typingDiv.className = 'message ai';
        typingDiv.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
        area.appendChild(typingDiv);
        area.scrollTop = area.scrollHeight;
    }
    
    function hideTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }
    
    function handleKey(e) {
        if (e.key === 'Enter') send();
    }
</script>
</body>
</html>
