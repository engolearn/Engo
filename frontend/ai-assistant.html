<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnGo AI - المعلم الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .header {
            background: linear-gradient(105deg, #4f46e5, #7c3aed);
            color: white;
            padding: 15px;
            text-align: center;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f1f5f9;
        }
        .message { margin-bottom: 12px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.ai { justify-content: flex-start; }
        .bubble {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
        }
        .user .bubble { background: #4f46e5; color: white; }
        .ai .bubble { background: white; color: #1e293b; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        .input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
        }
        .input-area button {
            background: #4f46e5;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .suggestions {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            flex-wrap: wrap;
            background: white;
            border-top: 1px solid #eef2ff;
        }
        .suggestion {
            background: #f1f5f9;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            color: #334155;
        }
        .suggestion:hover { background: #4f46e5; color: white; }
        .typing { display: flex; gap: 4px; padding: 5px; }
        .typing span { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<button class="back-btn" onclick="window.location.href='/'">← العودة</button>
<div class="container">
    <div class="header">
        <h2>🤖 EnGo AI | المعلم الذكي</h2>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message ai">
            <div class="bubble">
                👋 مرحباً! أنا <strong>EnGo AI</strong><br><br>
                📖 أساعدك في تعلم الإنجليزية:<br>
                • ترجمة الكلمات والجمل<br>
                • شرح القواعد النحوية<br>
                • نصائح للنطق والمحادثة<br><br>
                ✨ اسألني أي شيء!
            </div>
        </div>
    </div>
    <div class="suggestions">
        <div class="suggestion" onclick="askQuestion('ترجم: beautiful')">📖 ترجم beautiful</div>
        <div class="suggestion" onclick="askQuestion('شرح present perfect')">📘 Present Perfect</div>
        <div class="suggestion" onclick="askQuestion('كيف أحسن نطقي؟')">🗣️ نصائح للنطق</div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="اسأل عن الإنجليزية..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">📤</button>
    </div>
</div>

<script>
    const API_URL = window.location.origin + '/api';
    let isLoading = false;
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        
        if (!message || isLoading) return;
        
        addMessage(message, 'user');
        input.value = '';
        isLoading = true;
        showTyping();
        
        try {
            const token = localStorage.getItem('token');
            const response = await fetch(API_URL + '/ai/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            hideTyping();
            
            if (data.success) {
                addMessage(data.reply, 'ai');
            } else {
                addMessage(`⚠️ خطأ: ${data.message || "يرجى المحاولة مرة أخرى"}`, 'ai');
            }
        } catch (error) {
            hideTyping();
            addMessage("❌ خطأ في الاتصال بالخادم. حاول مرة أخرى.", 'ai');
        }
        
        isLoading = false;
    }
    
    function addMessage(text, sender) {
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }
    
    function showTyping() {
        const area = document.getElementById('chatArea');
        const typingDiv = document.createElement('div');
        typingDiv.id = 'typing';
        typingDiv.className = 'message ai';
        typingDiv.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span> يكتب...</div></div>`;
        area.appendChild(typingDiv);
        area.scrollTop = area.scrollHeight;
    }
    
    function hideTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }
    
    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }
    
    function askQuestion(q) {
        document.getElementById('messageInput').value = q;
        sendMessage();
    }
</script>
</body>
</html>
