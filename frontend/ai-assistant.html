<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnGo AI - المعلم الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .header {
            background: linear-gradient(105deg, #4f46e5, #7c3aed);
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .header h2 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f1f5f9;
        }
        .message {
            margin-bottom: 1rem;
            display: flex;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.ai {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 75%;
            padding: 0.7rem 1rem;
            border-radius: 18px;
            line-height: 1.5;
        }
        .user .bubble {
            background: #4f46e5;
            color: white;
        }
        .ai .bubble {
            background: white;
            color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        .input-area input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }
        .input-area input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .input-area button {
            background: #4f46e5;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .input-area button:hover {
            background: #6366f1;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 5px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-5px); }
        }
        .suggestions {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            flex-wrap: wrap;
            background: white;
            border-top: 1px solid #eef2ff;
        }
        .suggestion {
            background: #f1f5f9;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #334155;
        }
        .suggestion:hover {
            background: #4f46e5;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🤖 EnGo AI | المعلم الذكي</h2>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message ai">
            <div class="bubble">
                👋 مرحباً! أنا <strong>EnGo AI</strong><br><br>
                📖 أساعدك في تعلم الإنجليزية:<br>
                • ترجمة الكلمات والجمل<br>
                • شرح القواعد النحوية<br>
                • نصائح للنطق والمحادثة<br>
                • تصحيح الأخطاء<br><br>
                ✨ اسألني أي شيء!
            </div>
        </div>
    </div>
    <div class="suggestions">
        <div class="suggestion" onclick="askQuestion('ترجم: beautiful')">📖 ترجم beautiful</div>
        <div class="suggestion" onclick="askQuestion('شرح present perfect')">📘 Present Perfect</div>
        <div class="suggestion" onclick="askQuestion('كيف أحسن نطقي؟')">🗣️ نصائح للنطق</div>
        <div class="suggestion" onclick="askQuestion('الفرق between much and many')">🔤 much vs many</div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="اسأل عن الإنجليزية..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">📤</button>
    </div>
</div>

<script>
    // ========================================
    // ⚠️ ضع مفتاح API الخاص بك هنا 👇
    // ========================================
    const API_KEY = "AIzaSyCJ2SkGDSjKO9Y8UWN1k6W1CcKc2mqGwRA";
    
    let isLoading = false;
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        
        if (!message || isLoading) return;
        
        // عرض رسالة المستخدم
        addMessage(message, 'user');
        input.value = '';
        
        // إظهار مؤشر الكتابة
        isLoading = true;
        showTyping();
        
        try {
            // استدعاء Gemini API
            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${API_KEY}`,
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `أنت مساعد ذكي متخصص في اللغة الإنجليزية فقط، اسمك "EnGo AI". 
                                أجب على السؤال التالي باللغة العربية مع تقديم أمثلة إنجليزية واضحة ومفيدة.
                                ركز على تعليم اللغة الإنجليزية (قواعد، ترجمة، نطق، محادثات).
                                السؤال: ${message}`
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 800
                        }
                    })
                }
            );
            
            const data = await response.json();
            hideTyping();
            
            // استخراج الرد
            let reply = "عذراً، لم أستطع معالجة طلبك حالياً.";
            
            if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                reply = data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                console.error("API Error:", data.error);
                reply = `⚠️ خطأ في API: ${data.error.message || "يرجى التحقق من المفتاح"}`;
            }
            
            addMessage(reply, 'ai');
            
        } catch (error) {
            console.error("Error:", error);
            hideTyping();
            addMessage("❌ خطأ في الاتصال. تأكد من اتصالك بالإنترنت وصحة المفتاح.", 'ai');
        }
        
        isLoading = false;
    }
    
    function addMessage(text, sender) {
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        
        // تنسيق النص
        let formattedText = text.replace(/\n/g, '<br>');
        formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        div.innerHTML = `<div class="bubble">${formattedText}</div>`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }
    
    function showTyping() {
        const area = document.getElementById('chatArea');
        const typingDiv = document.createElement('div');
        typingDiv.id = 'typingIndicator';
        typingDiv.className = 'message ai';
        typingDiv.innerHTML = `
            <div class="bubble">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                    <span style="width:auto; background:none; animation:none; margin-right:5px;">EnGo AI يكتب...</span>
                </div>
            </div>
        `;
        area.appendChild(typingDiv);
        area.scrollTop = area.scrollHeight;
    }
    
    function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }
    
    function handleKey(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
    
    function askQuestion(question) {
        document.getElementById('messageInput').value = question;
        sendMessage();
    }
    
    // اختبار المفتاح عند تحميل الصفحة
    async function testApiKey() {
        try {
            const testUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`;
            const response = await fetch(testUrl);
            if (response.ok) {
                console.log("✅ API key is valid");
                addMessage("✅ **تم تفعيل الذكاء الاصطناعي!** يمكنك البدء في طرح الأسئلة.", 'ai');
            } else {
                const data = await response.json();
                console.error("API key error:", data);
                addMessage(`⚠️ **تنبيه:** المفتاح غير صالح. يرجى الحصول على مفتاح جديد من https://aistudio.google.com/apikey`, 'ai');
            }
        } catch (error) {
            console.error("Connection error:", error);
            addMessage("⚠️ **تنبيه:** فشل الاتصال بخوادم Google. تحقق من اتصالك بالإنترنت.", 'ai');
        }
    }
    
    // بدء التشغيل
    testApiKey();
</script>
</body>
</html>
