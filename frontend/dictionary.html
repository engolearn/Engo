    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 1rem 0;
        }
        
        .navbar .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .btn-back {
            background: #e2e8f0;
            color: #4a5568;
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .dictionary-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 20px;
        }
        
        /* بطاقة القاموس الرئيسية */
        .dictionary-card {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .search-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .search-section h1 {
            font-size: 1.8rem;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }
        
        .search-section p {
            color: #718096;
            margin-bottom: 1.5rem;
        }
        
        /* حقل البحث */
        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .search-input-wrapper {
            flex: 1;
            position: relative;
        }
        
        .search-input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
        }
        
        .search-input {
            width: 100%;
            padding: 1rem 3rem 1rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        
        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .search-btn:hover {
            transform: scale(1.02);
        }
        
        /* أزرار التصفية */
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        
        .filter-btn {
            background: #edf2f7;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
        }
        
        /* النتائج */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .results-count {
            color: #718096;
            font-size: 0.85rem;
        }
        
        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
        }
        
        /* بطاقة الكلمة */
        .word-card {
            background: #f7fafc;
            border-radius: 16px;
            padding: 1rem;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        
        .word-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        
        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .word-arabic {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d3748;
        }
        
        .word-english {
            color: #667eea;
            font-weight: 500;
        }
        
        .word-pronunciation {
            font-size: 0.8rem;
            color: #a0aec0;
            margin-top: 0.3rem;
        }
        
        .word-type {
            background: #e2e8f0;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #4a5568;
        }
        
        .word-example {
            font-size: 0.85rem;
            color: #718096;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed #e2e8f0;
        }
        
        /* حالة عدم وجود نتائج */
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #a0aec0;
        }
        
        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .word-type {
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 0.7rem;
    color: white;
    margin-right: 0.5rem;
}

.word-type.noun { background: #4299e1; }      /* اسم - أزرق */
.word-type.verb { background: #48bb78; }       /* فعل - أخضر */
.word-type.adjective { background: #ed8936; }  /* صفة - برتقالي */
.word-type.adverb { background: #9f7aea; }     /* ظرف - بنفسجي */
.word-type.greeting { background: #f6ad55; }   /* تحية - ذهبي */

.example-translation {
    font-size: 0.8rem;
    color: #718096;
    margin-top: 0.3rem;
    padding-right: 1rem;
}
        /* مؤشر التحميل */
        .loading-spinner {
            text-align: center;
            padding: 2rem;
            color: #667eea;
        }
        
        .loading-spinner i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .dictionary-card {
                padding: 1.5rem;
            }
            .search-box {
                flex-direction: column;
            }
            .search-btn {
                padding: 0.8rem;
            }
            .word-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

    <nav class="navbar">
        <div class="container">

    <div class="dictionary-container">

                <div class="search-box">

                    </div>
                    <button class="search-btn" onclick="searchWord()">
                        <i class="fas fa-search"></i> بحث
                    </button>
                </div>
                
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterResults('all')">الكل</button>

                    <button class="filter-btn" onclick="filterResults('verb')">🏃 فعل</button>

            </div>
            
            <div class="results-header">

        let currentResults = [];
        let currentFilter = "all";
        let currentSearchTerm = "";

        // تهيئة الصفحة
        function init() {
            currentResults = [...dictionaryData];
            renderResults();
        }

        // البحث
        function searchWord() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            currentSearchTerm = searchTerm;
            
            if (searchTerm === "") {
                currentResults = [...dictionaryData];
            } else {
                currentResults = dictionaryData.filter(item => 
                    item.ar.includes(searchTerm) || 
                    item.en.toLowerCase().includes(searchTerm)
                );
            }
            
            applyFilter();
        }

        // معالجة ضغط Enter
        function handleSearchKey(event) {
            if (event.key === 'Enter') {
                searchWord();
            }
        }

        // تصفية النتائج حسب النوع
        function filterResults(type) {
            currentFilter = type;
            
            // تحديث شكل الأزرار
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            applyFilter();
        }

        function applyFilter() {
            let filtered = [...currentResults];
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => item.type === currentFilter);
            }
            
            renderResults(filtered);
        }

        // عرض النتائج
        // عرض النتائج
function renderResults(results = null) {
    const container = document.getElementById('resultsContainer');
    const resultsCount = document.getElementById('resultsCount');
    const displayResults = results || currentResults;
    
    resultsCount.innerHTML = `${displayResults.length} نتيجة`;
    
    if (displayResults.length === 0) {
        container.innerHTML = `
            <div class="no-results">
                <i class="fas fa-search"></i>
                <p>لا توجد نتائج لـ "${currentSearchTerm || 'بحثك'}"</p>
                <p style="font-size: 0.8rem;">جرب كلمة أخرى</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = displayResults.map(item => `
        <div class="word-card" onclick="speakWord('${item.en}', '${item.ar}')">
            <div class="word-header">
                <div>
                    <span class="word-arabic">${item.ar}</span>
                    <span class="word-type ${item.type === 'فعل' ? 'verb' : (item.type === 'صفة' ? 'adjective' : (item.type === 'ظرف' ? 'adverb' : 'noun'))}">
                        ${getTypeIcon(item.type)} ${item.type}
                    </span>
                </div>
                <span class="word-english">${item.en}</span>
            </div>
            
            <div class="word-pronunciation">
                <i class="fas fa-microphone-alt"></i> النطق: ${item.pronunciation}
            </div>
            
            <div class="word-example">
                <div><i class="fas fa-quote-right"></i> مثال: ${item.example}</div>
                <div class="example-translation">📖 الترجمة: ${item.exampleTranslation}</div>
            </div>
        </div>
    `).join('');
}

// إضافة أيقونة لكل نوع
function getTypeIcon(type) {
    switch(type) {
        case 'اسم': return '📖';
        case 'فعل': return '🏃';
        case 'صفة': return '🎨';
        case 'ظرف': return '⏱️';
        case 'تحية': return '👋';
        default: return '📝';
    }
}

        // نطق الكلمة (باستخدام Web Speech API)
        function speakWord(english, arabic) {
            if ('speechSynthesis' in window) {
                // إيقاف أي نطق جاري
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance();
                utterance.text = `${english} - ${arabic}`;
                utterance.lang = 'ar-SA';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // بدء التطبيق
        init();
    </script>
